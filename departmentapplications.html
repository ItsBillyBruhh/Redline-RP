<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Department Applications</title>

    <link rel="icon" type="image/png" href="https://i.ibb.co/bRgdHVyh/Untitled.png">

    <style>
        :root {
            --logo-red: #ff1e46;
            --logo-blue: #00a3ff;
            --logo-pink: #ff007f;
            --logo-amber: #ffe094;
            --success-green: #00e676;
            --danger-red: #ff1e46;
            
            --glass-panel-bg: rgba(10, 6, 15, 0.82);
            --glass-card-bg: rgba(255, 255, 255, 0.03);
            --glass-border: 1px solid rgba(255, 255, 255, 0.08);
            --font-stack: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            --transition-smooth: all 0.4s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        body {
            margin: 0;
            font-family: var(--font-stack);
            color: #ffffff;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(-45deg, #0d0714, #1a091c, #0a0e17, #170710);
            background-size: 400% 400%;
            animation: flowingGradient 15s ease infinite;
            box-sizing: border-box;
        }

        @keyframes flowingGradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .topbar {
            position: fixed;
            top: 24px;
            z-index: 9999;
            width: 92%;
            max-width: 1300px;
            padding: 16px 0;
            background: rgba(8, 5, 12, 0.75);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border-radius: 24px;
            border: var(--glass-border);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(255, 255, 255, 0.05);
            display: flex;
            justify-content: center;
            gap: 50px;
            transition: var(--transition-smooth);
        }

        .topbar.hidden {
            opacity: 0;
            pointer-events: none;
            transform: translateY(-30px);
        }

        .topbar a {
            font-size: 14px;
            font-weight: 600;
            text-decoration: none;
            color: rgba(255, 255, 255, 0.65);
            letter-spacing: 0.8px;
            text-transform: uppercase;
            transition: var(--transition-smooth);
            position: relative;
        }

        .topbar a:hover {
            color: #ffffff;
            text-shadow: 0 0 15px rgba(255, 255, 255, 0.6);
        }

        .topbar a::after {
            content: '';
            position: absolute;
            bottom: -6px;
            left: 50%;
            width: 0;
            height: 2px;
            background: linear-gradient(90deg, var(--logo-red), var(--logo-pink));
            transition: var(--transition-smooth);
            border-radius: 2px;
            transform: translateX(-50%);
        }

        .topbar a:hover::after {
            width: 80%;
        }

        .main-container {
            width: 92%;
            max-width: 1300px;
            margin-top: 140px; 
            margin-bottom: 60px;
            opacity: 0;
            transform: translateY(30px);
            animation: fadeUp 1s cubic-bezier(0.1, 0.9, 0.2, 1) forwards;
        }

        @keyframes fadeUp {
            to { opacity: 1; transform: translateY(0); }
        }

        .split-layout {
            display: grid;
            grid-template-columns: 1fr 1.4fr;
            gap: 40px;
            align-items: start;
            width: 100%;
        }

        .info-panel {
            background: var(--glass-panel-bg);
            backdrop-filter: blur(40px);
            -webkit-backdrop-filter: blur(40px);
            border-radius: 32px;
            border: var(--glass-border);
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.4), inset 0 1px 1px rgba(255, 255, 255, 0.08);
            padding: 45px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            gap: 28px;
            position: sticky;
            top: 120px;
        }

        .status-pill {
            align-self: flex-start;
            padding: 8px 18px;
            border-radius: 30px;
            font-size: 11px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            transition: var(--transition-smooth);
        }

        .status-pill.open {
            background: rgba(0, 230, 118, 0.1);
            border: 1px solid var(--success-green);
            color: #b9ffd9;
        }

        .status-pill.closed {
            background: rgba(255, 30, 70, 0.1);
            border: 1px solid var(--danger-red);
            color: #ffb3bf;
        }

        .apply-header-img {
            width: 100%;
            border-radius: 20px;
            filter: drop-shadow(0 15px 30px rgba(0, 0, 0, 0.5));
            transition: var(--transition-smooth);
        }

        .info-panel:hover .apply-header-img {
            transform: scale(1.015) translateY(-2px);
        }

        p.tagline {
            font-size: 24px;
            line-height: 1.4;
            margin: 0;
            color: #ffffff;
            font-weight: 800;
            letter-spacing: -0.5px;
        }

        .btn-container {
            display: flex;
            flex-direction: column;
            gap: 14px;
            width: 100%;
        }

        .discord-btn, .roblox-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 18px 28px;
            border-radius: 16px;
            text-decoration: none;
            font-size: 14px;
            font-weight: 700;
            letter-spacing: 0.3px;
            transition: var(--transition-smooth);
            color: white;
            box-sizing: border-box;
            width: 100%;
        }

        .discord-btn {
            background: linear-gradient(135deg, #5865F2, #404eed);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 10px 25px rgba(88, 101, 242, 0.3);
        }

        .discord-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 30px rgba(88, 101, 242, 0.5);
            filter: brightness(1.1);
        }

        .roblox-btn {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.12);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
            backdrop-filter: blur(10px);
        }

        .roblox-btn:hover {
            transform: translateY(-3px);
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 255, 255, 0.25);
            box-shadow: 0 15px 30px rgba(255, 255, 255, 0.05);
        }

        .form-panel {
            background: var(--glass-panel-bg);
            backdrop-filter: blur(40px);
            -webkit-backdrop-filter: blur(40px);
            border-radius: 32px;
            border: var(--glass-border);
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.4), inset 0 1px 1px rgba(255, 255, 255, 0.08);
            padding: 24px;
            box-sizing: border-box;
            width: 100%;
            display: flex;
            flex-direction: column;
            min-height: 600px;
            justify-content: center;
        }

        iframe {
            width: 100%;
            height: 900px;
            border: none;
            border-radius: 20px;
            background: rgba(0, 0, 0, 0.2);
            box-shadow: inset 0 0 30px rgba(0, 0, 0, 0.6);
        }

        .closed-container {
            text-align: center;
            padding: 60px 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        .closed-icon {
            font-size: 64px;
            color: var(--logo-red);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(1.05); opacity: 1; }
            100% { transform: scale(1); opacity: 0.8; }
        }

        .closed-title {
            font-size: 28px;
            font-weight: 800;
            letter-spacing: -0.5px;
            margin: 0;
            background: linear-gradient(90deg, #ffffff, rgba(255,255,255,0.6));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .closed-text {
            font-size: 16px;
            color: rgba(255, 255, 255, 0.6);
            max-width: 440px;
            line-height: 1.6;
            margin: 0;
        }

        .footer {
            text-align: center;
            margin: auto 0 40px 0;
            font-size: 13px;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.4);
            letter-spacing: 0.5px;
        }

        @media (max-width: 1080px) {
            .split-layout {
                grid-template-columns: 1fr;
                gap: 35px;
            }
            .info-panel {
                position: relative;
                top: 0;
                padding: 35px;
            }
            .form-panel {
                padding: 16px;
            }
            iframe {
                height: 800px;
            }
        }

        @media (max-width: 650px) {
            .topbar {
                gap: 24px;
                padding: 14px 0;
                top: 16px;
                width: 90%;
            }
            .topbar a {
                font-size: 11px;
                letter-spacing: 0.5px;
            }
            .main-container {
                margin-top: 110px;
                margin-bottom: 40px;
            }
            p.tagline {
                font-size: 20px;
            }
            iframe {
                height: 700px;
            }
        }
    </style>
</head>

<body>

<div class="topbar">
    <a href="home.html">Home</a>
    <a href="civilianapplication.html">Civilian Application</a>
    <a href="departmentapplications.html">Department Applications</a>
    <a href="departments.html">Departments</a>
</div>

<div class="main-container">

    <div class="split-layout">
        
        <div class="info-panel">
            <div id="statusPill" class="status-pill"></div>
            
            <img class="apply-header-img" src="https://i.ibb.co/d4bcyHwp/2.png" alt="Apply to RedLine RP">
            
            <p class="tagline">The best roleplay server you’ll ever experience inside San Aurie.</p>
            
            <div class="btn-container">
                <a class="discord-btn" href="https://discord.gg/EgQfVurNMZ" target="_blank">
                    Join Our Discord (Required)
                </a>
                <a class="roblox-btn" href="https://www.roblox.com/communities/668533941/RedLine-RP-Community#!/about" target="_blank">
                    Join Our Roblox Group (Required)
                </a>
            </div>
        </div>

        <div class="form-panel" id="formPanel"></div>

    </div>

</div>

<div class="footer">
    &copy; 2026 RedLine RP &bull; All Rights Reserved
</div>

<script>
    const config = {
        applicationsOpen: false
    };

    const topbar = document.querySelector(".topbar");
    const scrollThreshold = 100; 

    window.addEventListener("scroll", () => {
        if (window.scrollY > scrollThreshold) {
            topbar.classList.add("hidden");
        } else {
            topbar.classList.remove("hidden");
        }
    });

    function initApplicationState() {
        const pill = document.getElementById("statusPill");
        const panel = document.getElementById("formPanel");
        
        if (config.applicationsOpen) {
            pill.textContent = "Applications Open";
            pill.classList.add("open");
            panel.innerHTML = `<iframe src="https://docs.google.com/forms/d/e/1FAIpQLSeYe7aBq6uYTyNYTqWzAO8oJ3tLgUMLWhdTZNIcc7Rzl3uRRA/viewform?embedded=true"></iframe>`;
        } else {
            pill.textContent = "Applications Closed";
            pill.classList.add("closed");
            panel.innerHTML = `
                <div class="closed-container">
                    <div class="closed-icon">&Eacute;</div>
                    <h2 class="closed-title">Recruitment Is Paused</h2>
                    <p class="closed-text">Department applications are currently closed. Please join our Discord server and stay tuned to announcements for the next cycle.</p>
                </div>
            `;
        }
    }

    initApplicationState();
</script>

</body>
</html>
