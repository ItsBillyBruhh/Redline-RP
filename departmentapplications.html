<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Department Applications</title>

    <link rel="icon" type="image/png" href="https://i.ibb.co/bRgdHVyh/Untitled.png">

    <style>
        :root {
            --glass-panel-bg: rgba(255, 255, 255, 0.05);
            --glass-card-bg: rgba(255, 255, 255, 0.08);
            --glass-card-hover: rgba(255, 255, 255, 0.15);
            --glass-border: 1px solid rgba(255, 255, 255, 0.12);
            --blur-radius: 20px;
            --font-stack: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            --transition-smooth: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        body {
            margin: 0;
            font-family: var(--font-stack);
            color: #ffffff;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            /* Premium dark crimson & charcoal theme */
            background: linear-gradient(135deg, #140606, #0b0b0d, #260a0a, #0f0f12);
            background-size: 300% 300%;
            animation: bgShift 18s ease infinite;
            box-sizing: border-box;
        }

        @keyframes bgShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* FLOATING TOPBAR */
        .topbar {
            position: fixed;
            top: 20px;
            z-index: 9999;
            width: 95%;
            max-width: 1500px;
            padding: 16px 0;
            background: rgba(15, 15, 18, 0.4);
            backdrop-filter: blur(var(--blur-radius));
            -webkit-backdrop-filter: blur(var(--blur-radius));
            border-radius: 35px;
            border: var(--glass-border);
            box-shadow: 0 10px 35px rgba(0, 0, 0, 0.4);
            display: flex;
            justify-content: center;
            gap: 50px;
            transition: var(--transition-smooth);
        }

        /* SCROLL FADE UTILITY CLASS */
        .topbar.hidden {
            opacity: 0;
            pointer-events: none;
            transform: translateY(-25px);
        }

        .topbar a {
            font-size: 16px;
            font-weight: 600;
            text-decoration: none;
            color: rgba(255, 255, 255, 0.75);
            letter-spacing: 0.4px;
            transition: var(--transition-smooth);
            position: relative;
        }

        .topbar a:hover {
            color: #ff4d4d;
        }

        .topbar a::after {
            content: '';
            position: absolute;
            bottom: -6px;
            left: 0;
            width: 0;
            height: 2px;
            background: #ff4d4d;
            transition: var(--transition-smooth);
            border-radius: 2px;
        }

        .topbar a:hover::after {
            width: 100%;
        }

        /* MAIN CONTENT WRAPPER */
        .main-container {
            width: 95%;
            max-width: 1100px;
            margin-top: 140px; 
            margin-bottom: 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
            opacity: 0;
            transform: translateY(15px);
            animation: fadeUp 0.6s ease forwards;
        }

        @keyframes fadeUp {
            to { opacity: 1; transform: translateY(0); }
        }

        /* GLASS CORE PANEL */
        .glass-panel {
            background: var(--glass-panel-bg);
            backdrop-filter: blur(var(--blur-radius));
            -webkit-backdrop-filter: blur(var(--blur-radius));
            border-radius: 28px;
            border: var(--glass-border);
            box-shadow: 0 20px 45px rgba(0, 0, 0, 0.4);
            padding: 50px 40px;
            text-align: center;
            width: 100%;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* HEADER IMAGE SPLASH */
        .apply-header-img {
            width: 100%;
            max-width: 600px;
            border-radius: 18px;
            margin-bottom: 25px;
            filter: drop-shadow(0 15px 30px rgba(0, 0, 0, 0.5));
            animation: float 6s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }

        p {
            font-size: 20px;
            margin: 0 0 35px 0;
            color: rgba(255, 255, 255, 0.75);
            font-weight: 400;
            letter-spacing: 0.2px;
        }

        /* CTA BUTTON CONTAINERS */
        .btn-container {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
            margin-bottom: 40px;
            width: 100%;
        }

        .discord-btn, .roblox-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 16px 38px;
            border-radius: 14px;
            text-decoration: none;
            font-size: 15px;
            font-weight: 700;
            transition: var(--transition-smooth);
            background: rgba(255, 255, 255, 0.06);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(5px);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }

        .discord-btn:hover, .roblox-btn:hover {
            transform: translateY(-3px);
            background: rgba(255, 77, 77, 0.2);
            border-color: rgba(255, 77, 77, 0.4);
            box-shadow: 0 8px 25px rgba(255, 77, 77, 0.15);
        }

        /* INTEGRATED APPLICATION IFRAME */
        iframe {
            width: 100%;
            max-width: 900px;
            height: 900px;
            border: none;
            border-radius: 18px;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: inset 0 0 20px rgba(0, 0, 0, 0.4);
        }

        /* FOOTER */
        .footer {
            text-align: center;
            margin: 25px 0 35px 0;
            font-size: 14px;
            font-weight: 500;
            color: rgba(255, 255, 255, 0.4);
            letter-spacing: 0.5px;
        }

        /* RESPONSIVE BREAKPOINTS */
        @media (max-width: 650px) {
            .topbar {
                gap: 20px;
                padding: 12px 0;
            }
            .topbar a {
                font-size: 13px;
            }
            .main-container {
                margin-top: 120px;
            }
            .glass-panel {
                padding: 35px 20px;
            }
            p {
                font-size: 17px;
            }
            .btn-container {
                flex-direction: column;
                align-items: center;
                gap: 14px;
            }
            .discord-btn, .roblox-btn {
                width: 100%;
                max-width: 400px;
                box-sizing: border-box;
            }
            iframe {
                height: 700px;
            }
        }
    </style>
</head>

<body>

<!-- FLOATING TOPBAR -->
<div class="topbar">
    <a href="home.html">Home</a>
    <a href="Civilian_Application.html">Civilian Application</a>
    <a href="departmentapplications.html">Department Applications</a>
    <a href="departments.html">Departments</a>
</div>

<!-- COMPONENT MAIN SECTION WRAPPER -->
<div class="main-container">

    <!-- COHESIVE MAIN CARD -->
    <div class="glass-panel">

        <!-- Header Splash Artwork -->
        <img class="apply-header-img" src="https://i.ibb.co/d4bcyHwp/2.png" alt="Apply to RedLine RP">

        <p>The best roleplay server you’ll ever experience inside San Aurie.</p>

        <!-- CTA REQUIREMENTS WRAPPER -->
        <div class="btn-container">
            <a class="discord-btn" href="https://discord.gg/EgQfVurNMZ" target="_blank">
                Join Our Discord (Required)
            </a>
            <a class="roblox-btn" href="https://www.roblox.com/communities/668533941/RedLine-RP-Community#!/about" target="_blank">
                Join Our Roblox Group (Required)
            </a>
        </div>

        <!-- FORM EMISSION STAGE -->
        <iframe src="https://docs.google.com/forms/d/e/1FAIpQLSeYe7aBq6uYTyNYTqWzAO8oJ3tLgUMLWhdTZNIcc7Rzl3uRRA/viewform?embedded=true"></iframe>
    </div>

</div>

<!-- FOOTER -->
<div class="footer">
    &copy; 2026 RedLine RP &bull; All Rights Reserved
</div>

<script>
    /* SCROLL CONTROLLER FOR TOP BAR FADE */
    const topbar = document.querySelector(".topbar");
    const scrollThreshold = 100; 

    window.addEventListener("scroll", () => {
        if (window.scrollY > scrollThreshold) {
            topbar.classList.add("hidden");
        } else {
            topbar.classList.remove("hidden");
        }
    });
</script>

</body>
</html>
