<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Civilian Application</title>

    <link rel="icon" type="image/png" href="https://i.ibb.co/bRgdHVyh/Untitled.png">

    <style>
        :root {
            --glass-panel-bg: rgba(15, 11, 11, 0.6);
            --glass-card-inner: rgba(255, 255, 255, 0.03);
            --glass-border: 1px solid rgba(255, 255, 255, 0.08);
            --accent-glow: rgba(255, 77, 77, 0.15);
            --blur-radius: 24px;
            --font-stack: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            --transition-smooth: all 0.4s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        body {
            margin: 0;
            font-family: var(--font-stack);
            color: #ffffff;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            background: radial-gradient(circle at 50% 0%, #2a0b0b 0%, #09090b 70%);
            background-color: #09090b;
            box-sizing: border-box;
        }

        /* FIXED STICKY TOPBAR */
        .topbar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            z-index: 9999;
            padding: 20px 0;
            background: rgba(9, 9, 11, 0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: var(--glass-border);
            display: flex;
            justify-content: center;
            gap: 40px;
            transition: var(--transition-smooth);
        }

        /* Smooth Hide/Show Utility Styles */
        .topbar.hidden {
            transform: translateY(-100%);
        }

        .topbar a {
            font-size: 15px;
            font-weight: 600;
            text-decoration: none;
            color: rgba(255, 255, 255, 0.6);
            letter-spacing: 0.5px;
            transition: var(--transition-smooth);
            position: relative;
        }

        .topbar a:hover {
            color: #ff4d4d;
        }

        .topbar a::after {
            content: '';
            position: absolute;
            bottom: -6px;
            left: 50%;
            width: 0;
            height: 2px;
            background: #ff4d4d;
            transition: var(--transition-smooth);
            transform: translateX(-50%);
            border-radius: 2px;
        }

        .topbar a:hover::after {
            width: 100%;
        }

        /* MAIN APP HUB CONTAINER */
        .main-container {
            width: 92%;
            max-width: 1000px;
            margin-top: 120px; 
            margin-bottom: 50px;
            opacity: 0;
            transform: translateY(20px);
            animation: fadeUp 0.8s cubic-bezier(0.25, 0.8, 0.25, 1) forwards;
            box-sizing: border-box;
        }

        @keyframes fadeUp {
            to { opacity: 1; transform: translateY(0); }
        }

        /* UNIFIED HUB WORKSPACE */
        .workspace-hub {
            background: var(--glass-panel-bg);
            backdrop-filter: blur(var(--blur-radius));
            -webkit-backdrop-filter: blur(var(--blur-radius));
            border-radius: 24px;
            border: var(--glass-border);
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.6), inset 0 1px 0 rgba(255, 255, 255, 0.1);
            padding: 35px;
            box-sizing: border-box;
        }

        /* HORIZONTAL INTEGRATED INFOBAR */
        .hub-header-zone {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 40px;
            background: var(--glass-card-inner);
            border: var(--glass-border);
            border-radius: 16px;
            padding: 25px 30px;
            margin-bottom: 30px;
        }

        .branding-meta {
            flex: 1;
            display: flex;
            align-items: center;
            gap: 25px;
        }

        .apply-header-img {
            width: 110px;
            height: 110px;
            object-fit: cover;
            border-radius: 14px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            filter: drop-shadow(0 8px 16px rgba(0, 0, 0, 0.3));
        }

        .text-details {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .text-details h1 {
            margin: 0;
            font-size: 24px;
            font-weight: 800;
            letter-spacing: -0.5px;
            background: linear-gradient(120deg, #ffffff, #ffb3b3);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p {
            font-size: 15px;
            line-height: 1.4;
            margin: 0;
            color: rgba(255, 255, 255, 0.6);
            font-weight: 400;
        }

        /* COMPACT RIGHT-ALIGNED ACTION STACK */
        .btn-container {
            display: flex;
            flex-direction: column;
            gap: 10px;
            min-width: 280px;
        }

        .discord-btn, .roblox-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 12px 20px;
            border-radius: 10px;
            text-decoration: none;
            font-size: 13px;
            font-weight: 700;
            letter-spacing: 0.3px;
            transition: var(--transition-smooth);
            color: white;
            box-sizing: border-box;
            width: 100%;
        }

        .discord-btn {
            background: #5865F2;
            box-shadow: 0 4px 12px rgba(88, 101, 242, 0.3);
        }

        .discord-btn:hover {
            background: #4752c4;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(88, 101, 242, 0.4);
        }

        .roblox-btn {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.15);
        }

        .roblox-btn:hover {
            background: rgba(255, 255, 255, 0.15);
            border-color: rgba(255, 255, 255, 0.3);
            transform: translateY(-2px);
        }

        /* FULL BREATHING AREA FOR IFRAME */
        .form-stage {
            position: relative;
            width: 100%;
            border-radius: 14px;
            overflow: hidden;
            background: #111113;
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: inset 0 4px 20px rgba(0, 0, 0, 0.5);
        }

        iframe {
            width: 100%;
            height: 900px;
            border: none;
            display: block;
        }

        /* FOOTER */
        .footer {
            text-align: center;
            margin: auto 0 30px 0;
            font-size: 13px;
            font-weight: 500;
            color: rgba(255, 255, 255, 0.3);
            letter-spacing: 0.5px;
        }

        /* CLEAN RESPONSIVE WRAPPING BREAKPOINTS */
        @media (max-width: 900px) {
            .hub-header-zone {
                flex-direction: column;
                align-items: stretch;
                padding: 25px;
                gap: 20px;
            }
            .branding-meta {
                flex-direction: column;
                text-align: center;
                gap: 15px;
            }
            .btn-container {
                min-width: 100%;
            }
            iframe {
                height: 750px;
            }
        }

        @media (max-width: 650px) {
            .topbar {
                gap: 20px;
                padding: 15px 10px;
            }
            .topbar a {
                font-size: 13px;
            }
            .workspace-hub {
                padding: 15px;
            }
            .text-details h1 {
                font-size: 20px;
            }
        }
    </style>
</head>

<body>

<!-- FIXED NAVIGATION SYSTEM -->
<div class="topbar">
    <a href="home.html">Home</a>
    <a href="civilianapplication.html">Civilian Application</a>
    <a href="departmentapplications.html">Department Applications</a>
    <a href="departments.html">Departments</a>
</div>

<!-- CENTRAL INTERFACE APP CANVASES -->
<div class="main-container">

    <div class="workspace-hub">
        
        <!-- HEADER MANAGEMENT PROFILE BOX -->
        <div class="hub-header-zone">
            <div class="branding-meta">
                <img class="apply-header-img" src="https://i.ibb.co/d4bcyHwp/2.png" alt="RedLine RP Design Asset">
                <div class="text-details">
                    <h1>Civilian Entry Portal</h1>
                    <p>The best roleplay server you’ll ever experience inside San Aurie.</p>
                </div>
            </div>

            <!-- COMMUNITY VERIFICATION STACKS -->
            <div class="btn-container">
                <a class="discord-btn" href="https://discord.gg/EgQfVurNMZ" target="_blank">
                    Join Our Discord (Required)
                </a>
                <a class="roblox-btn" href="https://www.roblox.com/communities/668533941/RedLine-RP-Community#!/about" target="_blank">
                    Join Our Roblox Group (Required)
                </a>
            </div>
        </div>

        <!-- FORM EMISSION ENVIRONMENT -->
        <div class="form-stage">
            <iframe src="https://docs.google.com/forms/d/e/1FAIpQLScYhl_lUKsxTnMIzGH7KmmZYo0Cvm9ho8VwM4WOxSpF5zypOQ/viewform?embedded=true"></iframe>
        </div>

    </div>

</div>

<!-- FOOTER -->
<div class="footer">
    &copy; 2026 RedLine RP &bull; All Rights Reserved
</div>

<script>
    /* SMART SCROLL DIRECTIONS NAVIGATION CONTROLLER */
    let lastScrollY = window.scrollY;
    const topbar = document.querySelector(".topbar");

    window.addEventListener("scroll", () => {
        if (window.scrollY > lastScrollY && window.scrollY > 80) {
            topbar.classList.add("hidden");
        } else {
            topbar.classList.remove("hidden");
        }
        lastScrollY = window.scrollY;
    });
</script>

</body>
</html>
