<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Civilian Application</title>

    <link class="favicon" type="image/png" href="https://i.ibb.co/bRgdHVyh/Untitled.png">

    <style>
        :root {
            --logo-red: #ff1e46;
            --logo-blue: #00a3ff;
            --logo-pink: #ff007f;
            --logo-amber: #ffe094;
            --success-green: #00e676;
            --danger-red: #ff1e46;
            
            --glass-panel-bg: rgba(13, 9, 20, 0.82);
            --glass-card-bg: rgba(255, 255, 255, 0.05);
            --glass-card-hover: rgba(255, 255, 255, 0.12);
            --glass-border: 1px solid rgba(255, 255, 255, 0.12);
            --font-stack: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            --transition-smooth: all 0.4s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        body {
            margin: 0;
            font-family: var(--font-stack);
            color: #ffffff;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(-45deg, var(--logo-red), #b0005a, var(--logo-blue), var(--logo-pink));
            background-size: 400% 400%;
            animation: flowingGradient 12s ease infinite;
            box-sizing: border-box;
        }

        @keyframes flowingGradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .topbar {
            position: fixed;
            top: 20px;
            z-index: 9999;
            width: 95%;
            max-width: 1400px;
            padding: 18px 0;
            background: rgba(13, 9, 20, 0.85);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border-radius: 20px;
            border: var(--glass-border);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.4), inset 0 1px 0 rgba(255, 255, 255, 0.1);
            display: flex;
            justify-content: center;
            gap: 45px;
            transition: var(--transition-smooth);
        }

        .topbar.hidden {
            opacity: 0;
            pointer-events: none;
            transform: translateY(-25px);
        }

        .topbar a {
            font-size: 15px;
            font-weight: 600;
            text-decoration: none;
            color: rgba(255, 255, 255, 0.75);
            letter-spacing: 0.5px;
            transition: var(--transition-smooth);
            position: relative;
        }

        .topbar a:hover {
            color: #ffffff;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
        }

        .topbar a::after {
            content: '';
            position: absolute;
            bottom: -6px;
            left: 0;
            width: 0;
            height: 2px;
            background: linear-gradient(90deg, var(--logo-blue), var(--logo-pink));
            transition: var(--transition-smooth);
            border-radius: 2px;
        }

        .topbar a:hover::after {
            width: 100%;
        }

        .main-container {
            width: 95%;
            max-width: 1400px;
            margin-top: 130px; 
            margin-bottom: 50px;
            opacity: 0;
            transform: translateY(20px);
            animation: fadeUp 0.8s cubic-bezier(0.25, 0.8, 0.25, 1) forwards;
        }

        @keyframes fadeUp {
            to { opacity: 1; transform: translateY(0); }
        }

        .split-layout {
            display: grid;
            grid-template-columns: 1fr 1.3fr;
            gap: 30px;
            align-items: start;
            width: 100%;
        }

        .info-panel {
            background: var(--glass-panel-bg);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border-radius: 24px;
            border: var(--glass-border);
            box-shadow: 0 20px 45px rgba(0, 0, 0, 0.3), inset 0 1px 0 rgba(255, 255, 255, 0.08);
            padding: 40px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            gap: 24px;
            position: sticky;
            top: 110px;
        }

        .status-pill {
            align-self: flex-start;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .status-pill.open {
            background: rgba(0, 230, 118, 0.15);
            border: 1px solid var(--success-green);
            color: #b9ffd9;
        }

        .status-pill.closed {
            background: rgba(255, 30, 70, 0.15);
            border: 1px solid var(--danger-red);
            color: #ffb3bf;
        }

        .apply-header-img {
            width: 100%;
            border-radius: 16px;
            filter: drop-shadow(0 10px 20px rgba(0, 0, 0, 0.4));
            transition: var(--transition-smooth);
        }

        .info-panel:hover .apply-header-img {
            transform: scale(1.02);
        }

        .portal-title {
            margin: 0;
            font-size: 28px;
            font-weight: 800;
            letter-spacing: -0.5px;
            background: linear-gradient(120deg, #ffffff, #ffb3b3);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p.tagline {
            font-size: 16px;
            line-height: 1.5;
            margin: -10px 0 0 0;
            color: rgba(255, 255, 255, 0.7);
            font-weight: 400;
        }

        .btn-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
            width: 100%;
        }

        .discord-btn, .roblox-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 16px 24px;
            border-radius: 12px;
            text-decoration: none;
            font-size: 14px;
            font-weight: 700;
            transition: var(--transition-smooth);
            color: white;
            box-sizing: border-box;
            width: 100%;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
        }

        .discord-btn {
            background: linear-gradient(135deg, #5865F2, var(--logo-blue));
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .discord-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(0, 163, 255, 0.5);
            filter: brightness(1.15);
        }

        .roblox-btn {
            background: linear-gradient(135deg, rgba(255,255,255,0.1), rgba(255,255,255,0.03));
            border: 1px solid rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(5px);
        }

        .roblox-btn:hover {
            transform: translateY(-3px);
            background: linear-gradient(135deg, var(--logo-red), var(--logo-pink));
            border-color: transparent;
            box-shadow: 0 8px 25px rgba(255, 30, 70, 0.4);
        }

        .form-panel {
            background: var(--glass-panel-bg);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border-radius: 24px;
            border: var(--glass-border);
            box-shadow: 0 20px 45px rgba(0, 0, 0, 0.3), inset 0 1px 0 rgba(255, 255, 255, 0.08);
            padding: 20px;
            box-sizing: border-box;
            width: 100%;
            display: flex;
            flex-direction: column;
        }

        iframe {
            width: 100%;
            height: 900px;
            border: none;
            border-radius: 16px;
            background: rgba(0, 0, 0, 0.2);
            box-shadow: inset 0 0 20px rgba(0, 0, 0, 0.4);
        }

        .closed-container {
            text-align: center;
            padding: 60px 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 400px;
        }

        .closed-icon {
            width: 60px;
            height: 60px;
            border: 3px solid var(--logo-red);
            border-radius: 50%;
            position: relative;
            margin-bottom: 24px;
            animation: pulse 2s infinite;
        }

        .closed-icon::before {
            content: '';
            position: absolute;
            width: 30px;
            height: 3px;
            background-color: var(--logo-red);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) rotate(45deg);
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(1.05); opacity: 1; }
            100% { transform: scale(1); opacity: 0.8; }
        }

        .closed-title {
            font-size: 26px;
            font-weight: 800;
            letter-spacing: -0.5px;
            margin: 0 0 12px 0;
            background: #ffffff;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .closed-text {
            font-size: 15px;
            color: rgba(255, 255, 255, 0.75);
            max-width: 420px;
            line-height: 1.5;
            margin: 0;
        }

        .footer {
            text-align: center;
            margin: auto 0 35px 0;
            font-size: 13px;
            font-weight: 600;
            color: #ffffff;
            text-shadow: 0 2px 10px rgba(0,0,0,0.4);
            letter-spacing: 0.5px;
        }

        @media (max-width: 1024px) {
            .split-layout {
                grid-template-columns: 1fr;
                gap: 25px;
            }
            .info-panel {
                position: relative;
                top: 0;
                padding: 30px;
            }
            .form-panel {
                padding: 15px;
            }
            iframe {
                height: 800px;
            }
        }

        @media (max-width: 650px) {
            .topbar {
                gap: 20px;
                padding: 14px 10px;
                top: 10px;
                width: 92%;
            }
            .topbar a {
                font-size: 12px;
            }
            .main-container {
                margin-top: 110px;
            }
            .portal-title {
                font-size: 22px;
            }
            iframe {
                height: 750px;
            }
        }
    </style>
</head>

<body>

<div class="topbar">
    <a href="home.html">Home</a>
    <a href="civilianapplication.html">Civilian Application</a>
    <a href="departmentapplications.html">Department Applications</a>
    <a href="departments.html">Departments</a>
</div>

<div class="main-container">

    <div class="split-layout">
        
        <div class="info-panel">
            <div id="statusPill" class="status-pill"></div>
            
            <img class="apply-header-img" src="https://i.ibb.co/d4bcyHwp/2.png" alt="Apply to RedLine RP">
            
            <h1 class="portal-title">Civilian Application</h1>
            <p class="tagline">The best roleplay server you’ll ever experience inside San Aurie.</p>
            
            <div class="btn-container">
                <a class="discord-btn" href="https://discord.gg/EgQfVurNMZ" target="_blank">
                    Join Our Discord (Required)
                </a>
                <a class="roblox-btn" href="https://www.roblox.com/communities/668533941/RedLine-RP-Community#!/about" target="_blank">
                    Join Our Roblox Group (Required)
                </a>
            </div>
        </div>

        <div class="form-panel" id="formPanel"></div>

    </div>

</div>

<div class="footer">
    &copy; 2026 RedLine RP &bull; All Rights Reserved
</div>

<script>
    const config = {
        applicationsOpen: true
    };

    const topbar = document.querySelector(".topbar");
    const scrollThreshold = 100; 

    window.addEventListener("scroll", () => {
        if (window.scrollY > scrollThreshold) {
            topbar.classList.add("hidden");
        } else {
            topbar.classList.remove("hidden");
        }
    });

    function initApplicationState() {
        const pill = document.getElementById("statusPill");
        const panel = document.getElementById("formPanel");
        
        if (config.applicationsOpen) {
            pill.textContent = "Applications Open";
            pill.classList.add("open");
            panel.innerHTML = `<iframe src="https://docs.google.com/forms/d/e/1FAIpQLScYhl_lUKsxTnMIzGH7KmmZYo0Cvm9ho8VwM4WOxSpF5zypOQ/viewform?embedded=true"></iframe>`;
        } else {
            pill.textContent = "Applications Closed";
            pill.classList.add("closed");
            panel.innerHTML = `
                <div class="closed-container">
                    <div class="closed-icon"></div>
                    <h2 class="closed-title">Recruitment Is Paused</h2>
                    <p class="closed-text">Civilian applications are currently closed. Please join our Discord server and stay tuned to announcements for the next cycle.</p>
                </div>
            `;
        }
    }

    initApplicationState();
</script>

</body>
</html>
