<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Civilian Application</title>

    <link rel="icon" type="image/png" href="https://i.ibb.co/bRgdHVyh/Untitled.png">

    <style>
        :root {
            --glass-panel-bg: rgba(255, 255, 255, 0.05);
            --glass-border: 1px solid rgba(255, 255, 255, 0.12);
            --blur-radius: 20px;
            --font-stack: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            --transition-smooth: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        body {
            margin: 0;
            font-family: var(--font-stack);
            color: #ffffff;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #140606, #0b0b0d, #260a0a, #0f0f12);
            background-size: 300% 300%;
            animation: bgShift 18s ease infinite;
            box-sizing: border-box;
        }

        @keyframes bgShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* FLOATING TOPBAR */
        .topbar {
            position: fixed;
            top: 20px;
            z-index: 9999;
            width: 95%;
            max-width: 1500px;
            padding: 16px 0;
            background: rgba(15, 15, 18, 0.4);
            backdrop-filter: blur(var(--blur-radius));
            -webkit-backdrop-filter: blur(var(--blur-radius));
            border-radius: 35px;
            border: var(--glass-border);
            box-shadow: 0 10px 35px rgba(0, 0, 0, 0.4);
            display: flex;
            justify-content: center;
            gap: 50px;
            transition: var(--transition-smooth);
        }

        .topbar.hidden {
            opacity: 0;
            pointer-events: none;
            transform: translateY(-25px);
        }

        .topbar a {
            font-size: 16px;
            font-weight: 600;
            text-decoration: none;
            color: rgba(255, 255, 255, 0.75);
            letter-spacing: 0.4px;
            transition: var(--transition-smooth);
            position: relative;
        }

        .topbar a:hover {
            color: #ff4d4d;
        }

        .topbar a::after {
            content: '';
            position: absolute;
            bottom: -6px;
            left: 0;
            width: 0;
            height: 2px;
            background: #ff4d4d;
            transition: var(--transition-smooth);
            border-radius: 2px;
        }

        .topbar a:hover::after {
            width: 100%;
        }

        /* NEW LAYOUT GRID WRAPPER */
        .main-container {
            width: 95%;
            max-width: 1400px;
            margin-top: 130px; 
            margin-bottom: 40px;
            display: grid;
            grid-template-columns: 400px 1fr;
            gap: 30px;
            align-items: start;
            opacity: 0;
            transform: translateY(15px);
            animation: fadeUp 0.6s ease forwards;
            box-sizing: border-box;
        }

        @keyframes fadeUp {
            to { opacity: 1; transform: translateY(0); }
        }

        /* LEFT SIDEBAR PANEL (STICKY CONTEXT) */
        .sidebar-panel {
            background: var(--glass-panel-bg);
            backdrop-filter: blur(var(--blur-radius));
            -webkit-backdrop-filter: blur(var(--blur-radius));
            border-radius: 24px;
            border: var(--glass-border);
            box-shadow: 0 20px 45px rgba(0, 0, 0, 0.3);
            padding: 40px 30px;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: sticky;
            top: 110px; /* Aligns smoothly under navigation bar when scrolling */
        }

        /* RIGHT FORM PANEL */
        .form-panel {
            background: var(--glass-panel-bg);
            backdrop-filter: blur(var(--blur-radius));
            -webkit-backdrop-filter: blur(var(--blur-radius));
            border-radius: 24px;
            border: var(--glass-border);
            box-shadow: 0 20px 45px rgba(0, 0, 0, 0.3);
            padding: 24px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
        }

        /* IMAGES & TYPOGRAPHY WITH RETAINED STYLES */
        .apply-header-img {
            width: 100%;
            max-width: 320px;
            border-radius: 14px;
            margin-bottom: 20px;
            filter: drop-shadow(0 10px 20px rgba(0, 0, 0, 0.4));
            animation: float 6s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-8px); }
        }

        p {
            font-size: 16px;
            line-height: 1.5;
            margin: 0 0 30px 0;
            color: rgba(255, 255, 255, 0.7);
            font-weight: 400;
        }

        /* STACKED BUTTON ENVIRONMENT FOR SIDEBAR */
        .btn-container {
            display: flex;
            flex-direction: column;
            gap: 14px;
            width: 100%;
        }

        .discord-btn, .roblox-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 15px 24px;
            border-radius: 12px;
            text-decoration: none;
            font-size: 14px;
            font-weight: 700;
            transition: var(--transition-smooth);
            background: rgba(255, 255, 255, 0.05);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(5px);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.15);
            box-sizing: border-box;
            width: 100%;
        }

        .discord-btn:hover, .roblox-btn:hover {
            transform: translateY(-2px);
            background: rgba(255, 77, 77, 0.18);
            border-color: rgba(255, 77, 77, 0.35);
            box-shadow: 0 6px 20px rgba(255, 77, 77, 0.15);
        }

        /* CLEAN EMBED ZONE */
        iframe {
            width: 100%;
            height: 880px;
            border: none;
            border-radius: 16px;
            background: rgba(0, 0, 0, 0.25);
            border: 1px solid rgba(255, 255, 255, 0.04);
            box-shadow: inset 0 0 25px rgba(0, 0, 0, 0.5);
        }

        /* FOOTER */
        .footer {
            text-align: center;
            margin: 20px 0 30px 0;
            font-size: 13px;
            font-weight: 500;
            color: rgba(255, 255, 255, 0.35);
            letter-spacing: 0.5px;
        }

        /* RESPONSIVE LAYOUT TRANSLATION */
        @media (max-width: 950px) {
            .main-container {
                grid-template-columns: 1fr;
                margin-top: 110px;
                gap: 25px;
            }
            .sidebar-panel {
                position: relative;
                top: 0;
                padding: 35px 24px;
            }
            .apply-header-img {
                max-width: 260px;
            }
            .btn-container {
                flex-direction: row;
                flex-wrap: wrap;
            }
            .discord-btn, .roblox-btn {
                flex: 1;
                min-width: 240px;
            }
            iframe {
                height: 750px;
            }
        }

        @media (max-width: 600px) {
            .topbar {
                gap: 20px;
                padding: 12px 0;
            }
            .topbar a {
                font-size: 13px;
            }
            .btn-container {
                flex-direction: column;
            }
            .discord-btn, .roblox-btn {
                width: 100%;
            }
        }
    </style>
</head>

<body>

<!-- FLOATING TOPBAR -->
<div class="topbar">
    <a href="home.html">Home</a>
    <a href="Civilian_Application.html">Civilian Application</a>
    <a href="departmentapplications.html">Department Applications</a>
    <a href="departments.html">Departments</a>
</div>

<!-- DUAL COLUMN LAYOUT WRAPPER -->
<div class="main-container">

    <!-- LEFT STICKY SIDEBAR PANEL -->
    <div class="sidebar-panel">
        <!-- Artwork -->
        <img class="apply-header-img" src="https://i.ibb.co/d4bcyHwp/2.png" alt="Apply to RedLine RP">

        <p>The best roleplay server you’ll ever experience inside San Aurie.</p>

        <!-- Requirements Action Stack -->
        <div class="btn-container">
            <a class="discord-btn" href="https://discord.gg/EgQfVurNMZ" target="_blank">
                Join Our Discord (Required)
            </a>
            <a class="roblox-btn" href="https://www.roblox.com/communities/668533941/RedLine-RP-Community#!/about" target="_blank">
                Join Our Roblox Group (Required)
            </a>
        </div>
    </div>

    <!-- RIGHT COMPONENT PANEL (FORM APPARATUS) -->
    <div class="form-panel">
        <iframe src="https://docs.google.com/forms/d/e/1FAIpQLScYhl_lUKsxTnMIzGH7KmmZYo0Cvm9ho8VwM4WOxSpF5zypOQ/viewform?embedded=true"></iframe>
    </div>

</div>

<!-- FOOTER -->
<div class="footer">
    &copy; 2026 RedLine RP &bull; All Rights Reserved
</div>

<script>
    /* SCROLL CONTROLLER FOR TOP BAR FADE */
    const topbar = document.querySelector(".topbar");
    const scrollThreshold = 100; 

    window.addEventListener("scroll", () => {
        if (window.scrollY > scrollThreshold) {
            topbar.classList.add("hidden");
        } else {
            topbar.classList.remove("hidden");
        }
    });
</script>

</body>
</html>
