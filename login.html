<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RedLine RP Login</title>

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="https://i.ibb.co/bRgdHVyh/Untitled.png">

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            color: #fff;
            overflow-x: hidden;

            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;

            height: 100vh;

            background: linear-gradient(120deg, #ff7a7a, #ff8ed6, #6fb3ff);
            background-size: 300% 300%;
            animation: bgShift 14s ease infinite;
        }

        @keyframes bgShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .glass-panel {
            width: 90%;
            max-width: 450px;
            padding: 45px 30px;

            background: rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(18px);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.25);
            box-shadow: 0 0 25px rgba(0, 0, 0, 0.25);

            text-align: center;
            animation: fadeSlideUp 1.2s ease forwards;
            opacity: 0;
            transform: translateY(30px);
        }

        @keyframes fadeSlideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .logo {
            width: 150px;
            height: auto;
            margin-bottom: 20px;
            border-radius: 15px;

            animation: float 4s ease-in-out infinite, fadeIn 1.4s ease forwards;
            opacity: 0;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }

        h1 {
            font-size: 38px;
            font-weight: 900;
            margin-bottom: 10px;

            background: linear-gradient(90deg, #ffffff, #ffe6f2, #ffffff);
            background-size: 200% 200%;
            -webkit-background-clip: text;
            color: transparent;
            animation: bgShift 6s linear infinite;
        }

        #staff-slogan {
            font-size: 18px;
            margin-top: -5px;
            margin-bottom: 25px;
            color: rgba(255, 255, 255, 0.85);
            text-shadow: 0 0 6px rgba(0, 0, 0, 0.35);
            min-height: 24px;
            font-weight: bold;
            letter-spacing: 0.5px;
        }

        input {
            width: 90%;
            padding: 14px;
            margin: 10px 0;
            border-radius: 10px;
            border: none;
            outline: none;
            font-size: 16px;

            background: rgba(255, 255, 255, 0.25);
            color: white;
        }

        button {
            width: 95%;
            padding: 14px;
            margin-top: 15px;
            border-radius: 10px;
            border: none;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;

            background: #5865F2;
            color: white;
            transition: 0.2s;
        }

        button:hover {
            transform: scale(1.05);
            opacity: 0.9;
        }
    </style>
</head>

<body>

<div class="glass-panel">

    <!-- LOGO -->
    <img class="logo" src="https://i.ibb.co/PZy08gcC/Icon.png">

    <h1>Admin Login</h1>

    <!-- ROTATING STAFF SLOGAN -->
    <p id="staff-slogan"></p>

    <input id="email" type="email" placeholder="Email">
    <input id="password" type="password" placeholder="Password">

    <button onclick="login()">Login</button>
</div>

<!-- Firebase Browser SDK -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js"></script>

<script>
    const firebaseConfig = {
      apiKey: "AIzaSyBQ6Rb1-W7YnTjKM6CIk61F9k0jdn5UgTQ",
      authDomain: "redline-rp-admin.firebaseapp.com",
      projectId: "redline-rp-admin",
      storageBucket: "redline-rp-admin.firebasestorage.app",
      messagingSenderId: "875176258980",
      appId: "1:875176258980:web:56e17ea4ddb3762c7d6531"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    async function login() {
        const email = document.getElementById("email").value;
        const password = document.getElementById("password").value;

        try {
            const cred = await auth.signInWithEmailAndPassword(email, password);
            window.location.href = "admin.html";
        } catch (err) {
            alert(err.message);
        }
    }

    /* ROTATING SLOGANS */
    const slogans = [
        "Integrity in Every Action.",
        "Where Leadership Meets Responsibility.",
        "Protecting the Experience, Not the Power.",
        "Calm, Capable, Committed.",
        "Staffed by Leaders, Driven by Respect.",
        "The Standard of Professional Roleplay.",
        "Trusted. Trained. Transparent."
    ];

    let sloganIndex = 0;
    let charIndex = 0;
    let typingSpeed = 60;
    let eraseSpeed = 40;
    let delayBetween = 1500;

    const sloganElement = document.getElementById("staff-slogan");

    function typeSlogan() {
        if (charIndex < slogans[sloganIndex].length) {
            sloganElement.innerHTML = slogans[sloganIndex].substring(0, charIndex + 1);
            charIndex++;
            setTimeout(typeSlogan, typingSpeed);
        } else {
            setTimeout(eraseSlogan, delayBetween);
        }
    }

    function eraseSlogan() {
        if (charIndex > 0) {
            sloganElement.innerHTML = slogans[sloganIndex].substring(0, charIndex - 1);
            charIndex--;
            setTimeout(eraseSlogan, eraseSpeed);
        } else {
            sloganIndex = (sloganIndex + 1) % slogans.length;
            setTimeout(typeSlogan, 300);
        }
    }

    typeSlogan();
</script>

</body>
</html>
