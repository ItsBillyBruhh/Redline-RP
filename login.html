<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RedLine RP Admin</title>

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="https://i.ibb.co/bRgdHVyh/Untitled.png">

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            color: #fff;
            overflow-x: hidden;

            display: flex;
            flex-direction: column;
            align-items: center;

            height: 100vh;

            background: linear-gradient(120deg, #ff7a7a, #ff8ed6, #6fb3ff);
            background-size: 300% 300%;
            animation: bgShift 14s ease infinite;
        }

        @keyframes bgShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .glass-panel {
            width: 90%;
            max-width: 700px;
            padding: 40px 25px;

            background: rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(18px);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.25);
            box-shadow: 0 0 25px rgba(0, 0, 0, 0.25);

            text-align: center;
            margin-top: 120px;

            animation: fadeSlideUp 1.2s ease forwards;
            opacity: 0;
            transform: translateY(30px);
        }

        @keyframes fadeSlideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h1 {
            font-size: 42px;
            font-weight: 900;

            background: linear-gradient(90deg, #ffffff, #ffe6f2, #ffffff);
            background-size: 200% 200%;
            -webkit-background-clip: text;
            color: transparent;
            animation: bgShift 6s linear infinite;
        }

        #rank {
            font-size: 20px;
            margin-top: -10px;
            margin-bottom: 25px;
            opacity: 0.85;
        }

        .btn {
            display: block;
            width: 90%;
            margin: 10px auto;
            padding: 14px;
            border-radius: 10px;
            background: rgba(255,255,255,0.25);
            border: 1px solid rgba(255,255,255,0.35);
            color: white;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }

        .btn:hover {
            transform: scale(1.05);
            background: rgba(255,255,255,0.35);
        }

        .logout {
            background: #E2231A;
            border: none;
        }
    </style>
</head>

<body>

<div class="glass-panel">
    <h1 id="welcome">Loading...</h1>
    <p id="rank"></p>

    <div id="content"></div>

    <button class="btn logout" onclick="logout()">Logout</button>
</div>

<!-- Firebase Browser SDK -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js"></script>

<script>
    console.log("Initializing Firebase...");

    const firebaseConfig = {
      apiKey: "AIzaSyBQ6Rb1-W7YnTjKM6CIk61F9k0jdn5UgTQ",
      authDomain: "redline-rp-admin.firebaseapp.com",
      projectId: "redline-rp-admin",
      storageBucket: "redline-rp-admin.firebasestorage.app",
      messagingSenderId: "875176258980",
      appId: "1:875176258980:web:56e17ea4ddb3762c7d6531"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    auth.onAuthStateChanged(async user => {
        if (!user) {
            console.log("No user logged in, redirecting...");
            window.location.href = "login.html";
            return;
        }

        console.log("User logged in:", user.uid);

        const doc = await db.collection("users").doc(user.uid).get();

        if (!doc.exists) {
            console.error("Firestore profile missing for:", user.uid);
            document.getElementById("welcome").innerText = "Profile Missing";
            return;
        }

        const data = doc.data();
        console.log("Loaded Firestore data:", data);

        document.getElementById("welcome").innerText = "Welcome, " + data.username;
        document.getElementById("rank").innerText = "Rank: " + data.rank;

        loadDashboard(data.rank);
    });

    function loadDashboard(rank) {
        const content = document.getElementById("content");
        let html = "";

        const roles = {
            "Owner": [
                "Staff Management",
                "View All Logs",
                "System Settings",
                "Developer Tools",
                "Admin Panel",
                "Moderation Tools"
            ],
            "Admin": [
                "Admin Panel",
                "Moderation Tools",
                "View Reports",
                "Staff Tools"
            ],
            "Moderator": [
                "Moderation Tools",
                "View Reports"
            ],
            "Support": [
                "Support Tickets",
                "Help Requests"
            ],
            "Developer": [
                "Developer Tools",
                "System Settings",
                "Debug Logs"
            ]
        };

        if (roles[rank]) {
            roles[rank].forEach(btn => {
                html += `<button class="btn">${btn}</button>`;
            });
        } else {
            html += `<p>No tools assigned to this rank.</p>`;
        }

        content.innerHTML = html;
    }

    function logout() {
        auth.signOut().then(() => {
            localStorage.clear();
            window.location.href = "login.html";
        });
    }
</script>

</body>
</html>
