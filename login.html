<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            color: #fff;
            overflow-x: hidden;

            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;

            height: 100vh;

            background: linear-gradient(120deg, #ff7a7a, #ff8ed6, #6fb3ff);
            background-size: 300% 300%;
            animation: bgShift 14s ease infinite;
        }

        @keyframes bgShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .glass-panel {
            width: 90%;
            max-width: 450px;
            padding: 45px 30px;

            background: rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(18px);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.25);
            box-shadow: 0 0 25px rgba(0, 0, 0, 0.25);

            text-align: center;
            animation: fadeSlideUp 1.2s ease forwards;
            opacity: 0;
            transform: translateY(30px);
        }

        @keyframes fadeSlideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .logo {
            width: 140px;
            height: auto;
            margin-bottom: 20px;
            border-radius: 15px;

            animation: float 4s ease-in-out infinite, fadeIn 1.4s ease forwards;
            opacity: 0;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }

        h1 {
            font-size: 38px;
            font-weight: 900;
            margin-bottom: 10px;

            background: linear-gradient(90deg, #ffffff, #ffe6f2, #ffffff);
            background-size: 200% 200%;
            -webkit-background-clip: text;
            color: transparent;
            animation: bgShift 6s linear infinite;
        }

        p {
            font-size: 16px;
            margin-top: -5px;
            margin-bottom: 25px;
            color: rgba(255, 255, 255, 0.75);
        }

        input {
            width: 90%;
            padding: 14px;
            margin: 10px 0;
            border-radius: 10px;
            border: none;
            outline: none;
            font-size: 16px;

            background: rgba(255, 255, 255, 0.25);
            color: white;
        }

        button {
            width: 95%;
            padding: 14px;
            margin-top: 15px;
            border-radius: 10px;
            border: none;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;

            background: #5865F2;
            color: white;
            transition: 0.2s;
        }

        button:hover {
            transform: scale(1.05);
            opacity: 0.9;
        }
    </style>
</head>

<body>

<div class="glass-panel">

    <!-- LOGO -->
    <img class="logo" src="https://i.ibb.co/PZy08gcC/Icon.png">

    <h1>Admin Login</h1>
    <p>Restricted Access — Authorized Staff Only</p>

    <input id="email" type="email" placeholder="Email">
    <input id="password" type="password" placeholder="Password">

    <button onclick="login()">Login</button>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "YOUR_KEY",
        authDomain: "YOUR_PROJECT.firebaseapp.com",
        projectId: "YOUR_PROJECT_ID",
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    async function login() {
        const email = document.getElementById("email").value;
        const password = document.getElementById("password").value;

        try {
            const cred = await auth.signInWithEmailAndPassword(email, password);
            const uid = cred.user.uid;

            const userDoc = await db.collection("users").doc(uid).get();
            const username = userDoc.data().username;

            localStorage.setItem("username", username);

            window.location.href = "admin.html";
        } catch (err) {
            alert(err.message);
        }
    }
</script>

</body>
</html>
