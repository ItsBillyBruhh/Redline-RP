<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RedLine RP Login</title>

    <link rel="icon" type="image/png" href="https://i.ibb.co/bRgdHVyh/Untitled.png">

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            color: #fff;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: linear-gradient(120deg, #ff7a7a, #ff8ed6, #6fb3ff);
            background-size: 300% 300%;
            animation: bgShift 14s ease infinite;
        }

        @keyframes bgShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .panel {
            width: 90%;
            max-width: 480px;
            padding: 50px 35px;
            background: rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(20px);
            border-radius: 25px;
            border: 1px solid rgba(255, 255, 255, 0.25);
            box-shadow: 0 0 35px rgba(0, 0, 0, 0.35);
            text-align: center;
            animation: fadeUp 1.2s ease forwards;
            opacity: 0;
            transform: translateY(40px);
        }

        @keyframes fadeUp {
            to { opacity: 1; transform: translateY(0); }
        }

        .logo {
            width: 160px;
            margin-bottom: 20px;
            border-radius: 20px;
            animation: float 4s ease-in-out infinite, fadeIn 1.4s ease forwards;
            opacity: 0;
        }

        @keyframes fadeIn { to { opacity: 1; } }
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-12px); }
            100% { transform: translateY(0px); }
        }

        h1 {
            font-size: 42px;
            font-weight: 900;
            margin-bottom: 10px;
            background: linear-gradient(90deg, #ffffff, #ffe6f2, #ffffff);
            background-size: 200% 200%;
            -webkit-background-clip: text;
            color: transparent;
            animation: bgShift 6s linear infinite;
        }

        #staff-slogan {
            font-size: 20px;
            margin-bottom: 30px;
            min-height: 26px;
            opacity: 0.9;
            font-weight: bold;
            letter-spacing: 0.5px;
            text-shadow: 0 0 6px rgba(0,0,0,0.4);
        }

        input {
            width: 92%;
            padding: 15px;
            margin: 12px 0;
            border-radius: 12px;
            border: none;
            outline: none;
            font-size: 17px;
            background: rgba(255, 255, 255, 0.25);
            color: white;
        }

        button {
            width: 95%;
            padding: 15px;
            margin-top: 20px;
            border-radius: 12px;
            border: none;
            font-size: 20px;
            font-weight: bold;
            cursor: pointer;
            background: #5865F2;
            color: white;
            transition: 0.25s;
        }

        button:hover {
            transform: scale(1.06);
            opacity: 0.92;
        }
    </style>
</head>

<body>

<div class="panel">
    <img class="logo" src="https://i.ibb.co/PZy08gcC/Icon.png">
    <h1>Admin Login</h1>
    <p id="staff-slogan"></p>

    <input id="email" type="email" placeholder="Email">
    <input id="password" type="password" placeholder="Password">

    <button onclick="login()">Login</button>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js"></script>

<script>
document.addEventListener("DOMContentLoaded", () => {

    const firebaseConfig = {
      apiKey: "AIzaSyBQ6Rb1-W7YnTjKM6CIk61F9k0jdn5UgTQ",
      authDomain: "redline-rp-admin.firebaseapp.com",
      projectId: "redline-rp-admin",
      storageBucket: "redline-rp-admin.firebasestorage.app",
      messagingSenderId: "875176258980",
      appId: "1:875176258980:web:56e17ea4ddb3762c7d6531"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();

    window.login = async function () {
        const email = document.getElementById("email").value.trim();
        const password = document.getElementById("password").value.trim();

        if (!email || !password) {
            alert("Please enter email and password.");
            return;
        }

        try {
            await auth.signInWithEmailAndPassword(email, password);
            window.location.href = "admin.html";
        } catch (err) {
            alert(err.message);
        }
    };

    const slogans = [
        "Integrity in Every Action.",
        "Where Leadership Meets Responsibility.",
        "Protecting the Experience, Not the Power.",
        "Calm, Capable, Committed.",
        "Staffed by Leaders, Driven by Respect.",
        "The Standard of Professional Roleplay.",
        "Trusted. Trained. Transparent."
    ];

    let i = 0, j = 0, isDeleting = false;
    const speed = 60, eraseSpeed = 40, delay = 1500;
    const el = document.getElementById("staff-slogan");

    function type() {
        const text = slogans[i];

        if (!isDeleting) {
            el.textContent = text.substring(0, j + 1);
            j++;
            if (j === text.length) {
                isDeleting = true;
                setTimeout(type, delay);
                return;
            }
        } else {
            el.textContent = text.substring(0, j - 1);
            j--;
            if (j === 0) {
                isDeleting = false;
                i = (i + 1) % slogans.length;
            }
        }

        setTimeout(type, isDeleting ? eraseSpeed : speed);
    }

    type();
});
</script>

</body>
</html>
