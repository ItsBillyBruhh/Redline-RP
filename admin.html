<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RedLine RP Admin</title>

    <link rel="icon" type="image/png" href="https://i.ibb.co/bRgdHVyh/Untitled.png">

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            color: #fff;
            overflow-x: hidden;

            display: flex;
            flex-direction: column;
            align-items: center;

            background: linear-gradient(120deg, #ff7a7a, #ff8ed6, #6fb3ff);
            background-size: 300% 300%;
            animation: bgShift 14s ease infinite;
        }

        @keyframes bgShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .container {
            width: 95%;
            max-width: 900px;
            margin-top: 40px;
            margin-bottom: 60px;

            background: rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(18px);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.25);
            padding: 30px;
            box-shadow: 0 0 25px rgba(0,0,0,0.25);
        }

        h1 {
            text-align: center;
            font-size: 40px;
            font-weight: 900;
            margin-bottom: 10px;

            background: linear-gradient(90deg, #ffffff, #ffe6f2, #ffffff);
            background-size: 200% 200%;
            -webkit-background-clip: text;
            color: transparent;
            animation: bgShift 6s linear infinite;
        }

        #userinfo {
            text-align: center;
            font-size: 18px;
            margin-bottom: 25px;
            opacity: 0.9;
        }

        iframe {
            width: 100%;
            height: 900px;
            border: none;
            border-radius: 15px;
            margin-bottom: 40px;
        }

        .logout {
            display: block;
            width: 200px;
            margin: 0 auto;
            padding: 14px;
            border-radius: 10px;
            border: none;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;

            background: #E2231A;
            color: white;
            transition: 0.2s;
        }

        .logout:hover {
            transform: scale(1.05);
            opacity: 0.9;
        }
    </style>
</head>

<body>

<div class="container">
    <h1>Admin Dashboard</h1>
    <p id="userinfo">Loading user...</p>

    <iframe src="https://docs.google.com/forms/d/e/1FAIpQLSd1_VrBBu2LUfmgZ8sUEga__eyxDoO829vt-RF39Jd4GZs/viewform?embedded=true"></iframe>

    <iframe src="https://docs.google.com/forms/d/e/1FAIpQLSd1wcCi4SFf-wsDgvu8DhS6jqI_Ab3-hFxtqzb2RFpaKU4/viewform?embedded=true"></iframe>

    <button class="logout" onclick="logout()">Logout</button>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js"></script>

<script>
    const firebaseConfig = {
      apiKey: "AIzaSyBQ6Rb1-W7YnTjKM6CIk61F9k0jdn5UgTQ",
      authDomain: "redline-rp-admin.firebaseapp.com",
      projectId: "redline-rp-admin",
      storageBucket: "redline-rp-admin.firebasestorage.app",
      messagingSenderId: "875176258980",
      appId: "1:875176258980:web:56e17ea4ddb3762c7d6531"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();

    auth.onAuthStateChanged(user => {
        if (!user) {
            window.location.href = "login.html";
            return;
        }

        document.getElementById("userinfo").innerText =
            "Logged in as: " + user.email;
    });

    function logout() {
        auth.signOut().then(() => {
            window.location.href = "login.html";
        });
    }
</script>

</body>
</html>
