<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RedLine RP Admin</title>

    <link rel="icon" type="image/png" href="https://i.ibb.co/bRgdHVyh/Untitled.png">

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            color: #fff;
            display: flex;
            height: 100vh;
            overflow: hidden;

            background: linear-gradient(120deg, #ff7a7a, #ff8ed6, #6fb3ff);
            background-size: 300% 300%;
            animation: bgShift 14s ease infinite;
        }

        @keyframes bgShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* SIDEBAR */
        .sidebar {
            width: 260px;
            background: rgba(0, 0, 0, 0.35);
            backdrop-filter: blur(12px);
            padding: 25px;
            display: flex;
            flex-direction: column;
            border-right: 1px solid rgba(255,255,255,0.2);
        }

        .sidebar h2 {
            font-size: 26px;
            font-weight: 900;
            margin-bottom: 20px;
            text-align: center;
        }

        .nav-btn {
            padding: 14px;
            margin-bottom: 12px;
            border-radius: 10px;
            background: rgba(255,255,255,0.15);
            border: 1px solid rgba(255,255,255,0.25);
            color: white;
            font-size: 17px;
            cursor: pointer;
            transition: 0.2s;
            text-align: left;
        }

        .nav-btn:hover {
            background: rgba(255,255,255,0.3);
            transform: scale(1.03);
        }

        .logout {
            margin-top: auto;
            background: #E2231A;
            border: none;
            text-align: center;
        }

        /* MAIN CONTENT */
        .content {
            flex: 1;
            overflow-y: auto;
            padding: 30px;
        }

        h1 {
            font-size: 40px;
            font-weight: 900;
            margin-bottom: 10px;

            background: linear-gradient(90deg, #ffffff, #ffe6f2, #ffffff);
            background-size: 200% 200%;
            -webkit-background-clip: text;
            color: transparent;
            animation: bgShift 6s linear infinite;
        }

        #userinfo {
            font-size: 18px;
            opacity: 0.9;
            margin-bottom: 25px;
        }

        iframe {
            width: 100%;
            height: 900px;
            border: none;
            border-radius: 15px;
            margin-bottom: 40px;
        }
    </style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
    <h2>Admin Panel</h2>

    <button class="nav-btn" onclick="showSection('form1')">Staff Application Form</button>
    <button class="nav-btn" onclick="showSection('form2')">Ban Appeal Form</button>

    <!-- Future buttons -->
    <button class="nav-btn">Staff Tools</button>
    <button class="nav-btn">Logs</button>
    <button class="nav-btn">Tickets</button>
    <button class="nav-btn">Developer Tools</button>

    <button class="nav-btn logout" onclick="logout()">Logout</button>
</div>

<!-- MAIN CONTENT -->
<div class="content">
    <h1>Welcome to the Admin Dashboard</h1>
    <p id="userinfo">Loading user...</p>

    <!-- FORM 1 -->
    <div id="form1" class="section">
        <iframe src="https://docs.google.com/forms/d/e/1FAIpQLSd1_VrBBu2LUfmgZ8sUEga__eyxDoO829vt-RF39Jd4GZs/viewform?embedded=true"></iframe>
    </div>

    <!-- FORM 2 -->
    <div id="form2" class="section" style="display:none;">
        <iframe src="https://docs.google.com/forms/d/e/1FAIpQLSd1wcCi4SFf-wsDgvu8DhS6jqI_Ab3-hFxtqzb2RFpaKU4/viewform?embedded=true"></iframe>
    </div>
</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js"></script>

<script>
    const firebaseConfig = {
      apiKey: "AIzaSyBQ6Rb1-W7YnTjKM6CIk61F9k0jdn5UgTQ",
      authDomain: "redline-rp-admin.firebaseapp.com",
      projectId: "redline-rp-admin",
      storageBucket: "redline-rp-admin.firebasestorage.app",
      messagingSenderId: "875176258980",
      appId: "1:875176258980:web:56e17ea4ddb3762c7d6531"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();

    /* PROTECT PAGE */
    auth.onAuthStateChanged(user => {
        if (!user) {
            window.location.href = "login.html";
            return;
        }

        document.getElementById("userinfo").innerText =
            "Logged in as: " + user.email;
    });

    /* LOGOUT */
    function logout() {
        auth.signOut().then(() => {
            window.location.href = "login.html";
        });
    }

    /* SWITCH SECTIONS */
    function showSection(id) {
        document.querySelectorAll(".section").forEach(sec => sec.style.display = "none");
        document.getElementById(id).style.display = "block";
    }
</script>

</body>
</html>
